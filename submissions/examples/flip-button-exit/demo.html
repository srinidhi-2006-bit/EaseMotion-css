<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Button Exit - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h1>Flip Button Exit</h1>
    <p>A beautiful 3D flip-away exit animation for button components.</p>
    
    <div class="button-wrapper">
      <button id="targetBtn" class="flip-btn">Click to Exit 🚀</button>
    </div>
    
    <button id="resetBtn" class="reset-btn hidden">Reset Button ⟲</button>
  </div>

  <script>
    const targetBtn = document.getElementById('targetBtn');
    const resetBtn = document.getElementById('resetBtn');

    targetBtn.addEventListener('click', () => {
      targetBtn.classList.add('exit-active');
      setTimeout(() => {
        resetBtn.classList.remove('hidden');
      }, 300); // match animation duration
    });

    resetBtn.addEventListener('click', () => {
      targetBtn.classList.remove('exit-active');
      resetBtn.classList.add('hidden');
    });
  </script>
</body>
</html>
