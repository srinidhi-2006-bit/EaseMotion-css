<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Icon Exit - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h1>Pulse Icon Exit</h1>
    <p>A satisfying pulsing close-out exit animation for icon components.</p>
    
    <div class="icon-wrapper">
      <button id="targetIcon" class="pulse-icon" title="Click to Exit">
        <!-- SVG Trash Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </button>
    </div>
    
    <button id="resetBtn" class="reset-btn hidden">Reset Icon ⟲</button>
  </div>

  <script>
    const targetIcon = document.getElementById('targetIcon');
    const resetBtn = document.getElementById('resetBtn');

    targetIcon.addEventListener('click', () => {
      targetIcon.classList.add('exit-active');
      setTimeout(() => {
        resetBtn.classList.remove('hidden');
      }, 400); // match animation duration
    });

    resetBtn.addEventListener('click', () => {
      targetIcon.classList.remove('exit-active');
      resetBtn.classList.add('hidden');
    });
  </script>
</body>
</html>
