<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Creep - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Shadow Creep</h1>

    <div class="shadow-card" id="shadowCard">
      <div class="shadow-overlay"></div>
      <div class="shadow-content">
        <div class="shadow-icon">
          <div class="moon"></div>
          <div class="crescent"></div>
        </div>
        <span class="shadow-title">Cursed</span>
        <p class="shadow-desc">A dark shadow creeps across the element from the left edge.</p>
      </div>
      <button class="shadow-btn" id="shadowBtn">&#127769; Curse</button>
    </div>

    <p class="description">A dark gradient overlay spreads from left to right via clip-path animation, simulating a creeping shadow with a soft edge.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
