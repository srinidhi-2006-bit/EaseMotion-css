<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Charge - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Energy Charge</h1>

    <div class="charge-card" id="chargeCard">
      <div class="charge-content">
        <div class="charge-icon">
          <div class="bolt"></div>
        </div>
        <span class="charge-title">Charging...</span>
        <div class="charge-meter">
          <div class="charge-fill" id="chargeFill"></div>
        </div>
        <span class="charge-pct" id="chargePct">0%</span>
      </div>
      <button class="charge-btn" id="chargeBtn">&#9889; Charge</button>
    </div>

    <p class="description">The element builds up glowing energy with increasing box-shadow intensity and a progress meter that fills up, simulating a charging attack.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
