<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Utilities Demo</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1>CSS Filter Utilities Demo</h1>

    <div class="container">

        <div class="card">
            <img class="ease-blur-sm"
                src="https://picsum.photos/300/200?random=1"
                alt="Blur Small">
            <p>.ease-blur-sm</p>
        </div>

        <div class="card">
            <img class="ease-blur"
                src="https://picsum.photos/300/200?random=2"
                alt="Blur">
            <p>.ease-blur</p>
        </div>

        <div class="card">
            <img class="ease-blur-lg"
                src="https://picsum.photos/300/200?random=3"
                alt="Blur Large">
            <p>.ease-blur-lg</p>
        </div>

        <div class="card">
            <img class="ease-brightness-50"
                src="https://picsum.photos/300/200?random=4"
                alt="Brightness 50">
            <p>.ease-brightness-50</p>
        </div>

        <div class="card">
            <img class="ease-brightness-150"
                src="https://picsum.photos/300/200?random=5"
                alt="Brightness 150">
            <p>.ease-brightness-150</p>
        </div>

        <div class="card">
            <img class="ease-grayscale"
                src="https://picsum.photos/300/200?random=6"
                alt="Grayscale">
            <p>.ease-grayscale</p>
        </div>

        <div class="card">
            <img class="ease-sepia"
                src="https://picsum.photos/300/200?random=7"
                alt="Sepia">
            <p>.ease-sepia</p>
        </div>

    </div>

</body>
</html>
