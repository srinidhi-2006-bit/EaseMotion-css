<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Tilt Effect - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="em-tilt-container">
        
        <div class="tilt-zone top-left"></div>
        <div class="tilt-zone top-mid"></div>
        <div class="tilt-zone top-right"></div>
        <div class="tilt-zone mid-left"></div>
        <div class="tilt-zone center"></div>
        <div class="tilt-zone mid-right"></div>
        <div class="tilt-zone bot-left"></div>
        <div class="tilt-zone bot-mid"></div>
        <div class="tilt-zone bot-right"></div>

        <div class="em-tilt-card">
            Tilt Me
        </div>
        
    </div>

</body>
</html>
