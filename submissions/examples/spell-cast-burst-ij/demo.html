<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Cast Burst - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Spell Cast Burst</h1>

    <div class="burst-card">
      <div class="burst-icon" id="burstIcon">
        <div class="burst-flash"></div>
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
      </div>
      <span class="burst-label">Cast Spell</span>
      <button class="cast-btn" id="castBtn">&#9889; Cast</button>
    </div>

    <div class="variant-row">
      <div class="burst-card sm">
        <div class="burst-icon">
          <div class="burst-flash done"></div>
          <div class="particle p1 done"></div>
          <div class="particle p2 done"></div>
          <div class="particle p3 done"></div>
          <div class="particle p4 done"></div>
        </div>
        <span class="burst-label">Spent</span>
      </div>
    </div>

    <p class="description">Click "Cast" to trigger a dramatic radial burst with a central flash and particles flying outward, simulating a spell-casting moment.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
