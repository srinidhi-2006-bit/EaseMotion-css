<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staggered Fade Entrance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <p class="tag">SEQUENTIAL ENTRANCE</p>
    <h1>Staggered Fade Entrance</h1>
    
    <p class="subtitle">
            A sequence of items fading in with increasing delays.
    </p>

    <div class="card fade-item" style="animation-delay: 0.1s;">
      First Item
    </div>

    <div class="card fade-item" style="animation-delay: 0.3s;">
      Second Item
    </div>

    <div class="card fade-item" style="animation-delay: 0.5s;">
      Third Item
    </div>

    <div class="card fade-item" style="animation-delay: 0.7s;">
      Fourth Item
    </div>
  </main>

</body>
</html>
