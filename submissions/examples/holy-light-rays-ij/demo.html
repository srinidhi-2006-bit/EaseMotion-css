<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holy Light Rays - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Holy Light Rays</h1>

    <div class="holy-card" id="holyCard">
      <div class="holy-rays"></div>
      <div class="holy-content">
        <div class="holy-icon">
          <div class="cross"></div>
        </div>
        <span class="holy-title">Blessed</span>
      </div>
      <button class="holy-btn" id="holyBtn">&#10022; Consecrate</button>
    </div>

    <p class="description">Light rays radiate outward from the center using a conic-gradient with alternating opacity bands, slowly rotating to create a divine light effect.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
