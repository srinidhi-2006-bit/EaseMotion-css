<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poison Bubble - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Poison Bubble</h1>

    <div class="poison-card" id="poisonCard">
      <div class="poison-content">
        <div class="poison-icon">
          <div class="skull"></div>
        </div>
        <span class="poison-title">Poisoned</span>
      </div>
      <div class="bubbles">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
        <div class="bubble b5"></div>
      </div>
      <button class="poison-btn" id="poisonBtn">&#9762; Poison</button>
    </div>

    <p class="description">Green toxic bubbles rise erratically from the bottom of the container with staggered timing, simulating a poison/toxic status effect.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
